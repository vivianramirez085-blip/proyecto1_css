<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Mi proyecto CSS</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>

<h1>Mi Página Web</h1>

<div class="contenedor">
    <h2>Sección de ejemplo</h2>
    <p>Este texto hereda estilos del contenedor.</p>
    <p>Otro párrafo dentro del contenedor.</p>

    <ul>
        <li>Elemento uno</li>
        <li>Elemento dos</li>
        <li>Elemento tres</li>
    </ul>
</div>

<h2>Sección con Flexbox</h2>

<div class="contenedor-flex">
    <div class="caja">Caja 1</div>
    <div class="caja">Caja 2</div>
    <div class="caja">Caja 3</div>
</div>

<h2>Alineación con Flexbox</h2>

<div class="contenedor-alineacion">
    <div class="item">A</div>
    <div class="item">B</div>
    <div class="item">C</div>
    <div class="item">D</div>
</div>

<h2>Ejemplo de Position</h2>

<div class="contenedor-position">
    <div class="caja-normal">Caja normal</div>
    <div class="caja-absoluta">Caja absoluta</div>
</div>

</body>
</html>
